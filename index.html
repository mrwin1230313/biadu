<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔞 成人内容访问验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .verify-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
        }
        .warning-icon {
            font-size: 60px;
            color: #ff3333;
            margin-bottom: 20px;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ff4444;
        }
        .subtitle {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 36px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .btn-yes {
            background-color: #ff3333;
            color: white;
        }
        .btn-yes:hover {
            background-color: #cc0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        .btn-no {
            background-color: #333;
            color: white;
        }
        .btn-no:hover {
            background-color: #555;
        }
        .footer-note {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="verify-card">
        <div class="warning-icon">⚠️</div>
        <h1 class="title">年龄验证</h1>
        <p class="subtitle">
            此网站包含仅限成人的内容。<br>
            您必须年满18岁才能访问。<br>
            请确认您的年龄。
        </p>
        <div class="btn-group">
            <button class="btn btn-yes" onclick="goAdult()">我已年满18岁，继续访问</button>
            <button class="btn btn-no" onclick="goEducation()">我未满18岁，离开此页面</button>
        </div>
        <div class="footer-note">
            我们重视未成年人保护，请选择正确选项
        </div>
    </div>

    <script>
        // 选择"已满18岁"：跳转到B站视频
        function goAdult() {
            window.location.href = "https://www.bilibili.com/video/BV1fN2wBSEvq/?spm_id_from=333.337.search-card.all.click";
        }

        // 选择"未满18岁"：跳转到广州共享课堂
        function goEducation() {
            window.location.href = "https://gz.etiantian.com/";
        }
    </script>
</body>
</html>
